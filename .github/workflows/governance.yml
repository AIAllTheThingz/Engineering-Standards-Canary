name: Downstream Governance Canary

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scenario:
        description: Synthetic canary scenario to execute.
        type: choice
        required: true
        default: success
        options:
          - success
          - controlled-failure
          - governance-version-mismatch
          - missing-required-file
          - mandatory-control-disablement
          - python-traversal
          - python-runtime-tool-substitution
          - python-malformed-metadata

permissions:
  contents: read

jobs:
  repository_shape:
    name: Repository shape
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout canary
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Prove central implementation directories are absent
        shell: bash
        run: |
          set -euo pipefail
          for forbidden in scripts actions agents examples; do
            if git ls-tree -d -r --name-only HEAD |
              awk -F/ -v name="${forbidden}" '$NF == name { found=1 } END { exit !found }'
            then
              echo "Forbidden copied central directory found: ${forbidden}" >&2
              exit 1
            fi
          done
          echo "No copied central implementation directories are present."

  success:
    name: Governance success
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario == 'success' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: .
      governance-version: 1.1.0
      artifact-retention-days: 30

  controlled_failure:
    name: Controlled failure
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'controlled-failure' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: .
      governance-version: 1.1.0
      artifact-retention-days: 30
      controlled-failure-test: true

  governance_version_mismatch:
    name: Governance version mismatch
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'governance-version-mismatch' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: .
      governance-version: 1.0.0
      artifact-retention-days: 30

  missing_required_file:
    name: Missing required file
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'missing-required-file' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: canary-scenarios/missing-required-file
      governance-version: 1.1.0
      artifact-retention-days: 30

  mandatory_control_disablement:
    name: Mandatory control disablement
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'mandatory-control-disablement' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/governance-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: canary-scenarios/mandatory-control-disablement
      governance-version: 1.1.0
      artifact-retention-days: 30

  python_functional:
    name: Python functional success
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario == 'success' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/python-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: .

  python_traversal:
    name: Python traversal rejection
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'python-traversal' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/python-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: ../

  python_runtime_tool_substitution:
    name: Python runtime tool substitution rejection
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'python-runtime-tool-substitution' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/python-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: python-scenarios/runtime-tool-substitution

  python_malformed_metadata:
    name: Python malformed metadata rejection
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'python-malformed-metadata' }}
    needs: repository_shape
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/python-ci-reusable.yml@1880943b08466769fa2c0c8560e0d43d3a48ccfa
    with:
      project-path: python-scenarios/malformed-metadata
