name: Bash Functional Canary

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scenario:
        description: Synthetic Bash functional scenario to execute.
        type: choice
        required: true
        default: success
        options:
          - success
          - shellcheck-failure
          - format-failure
          - bats-failure
          - caller-config-bypass

permissions:
  contents: read

jobs:
  success:
    name: Bash success
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.scenario == 'success' }}
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@42c5e1e3305998466e353d246e4bf27886102626
    with:
      project-path: bash-functional

  shellcheck_failure:
    name: ShellCheck failure
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'shellcheck-failure' }}
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@42c5e1e3305998466e353d246e4bf27886102626
    with:
      project-path: bash-functional-scenarios/shellcheck-failure

  format_failure:
    name: Formatting failure
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'format-failure' }}
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@42c5e1e3305998466e353d246e4bf27886102626
    with:
      project-path: bash-functional-scenarios/format-failure

  bats_failure:
    name: Bats failure
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'bats-failure' }}
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@42c5e1e3305998466e353d246e4bf27886102626
    with:
      project-path: bash-functional-scenarios/bats-failure

  caller_config_bypass:
    name: Caller configuration bypass
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario == 'caller-config-bypass' }}
    uses: AIAllTheThingz/Engineering-Standards/.github/workflows/bash-ci-reusable.yml@42c5e1e3305998466e353d246e4bf27886102626
    with:
      project-path: bash-functional-scenarios/caller-config-bypass
